name: Deploy IdleCloud Web

on:
  push:
    branches: [main, master]
    paths:
      - "webapp/**"
      - ".github/workflows/deploy-idlecloud-web.yml"
  workflow_dispatch:
    inputs:
      base_path:
        description: "Optional site base path, including leading and trailing slash. Leave blank for /<repository-name>/"
        required: false
        default: ""

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    if: github.event.repository.private == false
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: webapp
    steps:
      - name: Check out source
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v5
      - name: Install dependencies
        run: npm install
      - name: Run deterministic simulation tests
        run: npm test
      - name: Build static site
        env:
          VITE_BASE_PATH: ${{ inputs.base_path || steps.pages.outputs.base_path }}
        run: npm run build
      - name: Disable Jekyll processing
        run: touch dist/.nojekyll
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: webapp/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
