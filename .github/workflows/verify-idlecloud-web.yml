name: Verify IdleCloud Web

on:
  push:
    branches: [main, master]
    paths:
      - "webapp/**"
      - ".github/workflows/verify-idlecloud-web.yml"
  pull_request:
    paths:
      - "webapp/**"
      - ".github/workflows/verify-idlecloud-web.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: webapp
    steps:
      - name: Check out source
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install
      - name: Run deterministic simulation tests
        run: npm test
      - name: Build production bundle
        run: npm run build